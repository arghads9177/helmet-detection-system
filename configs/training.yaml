# Training hyperparameters and augmentation policy.
# Mirrors what goes into artifacts/experiment_results/<version>/metadata.json after a run.
# Phase 2-3 (implementation_plan.md, Slice 2.1): YOLO11n baseline, transfer learning from
# COCO-pretrained weights (OQ-M resolved). Never train from scratch.

epochs: 100
batch_size: 16
lr: 0.001
seed: 42
img_size: 640
patience: 20   # early-stop patience, epochs with no val mAP improvement

base_weights: yolo11n.pt   # COCO-pretrained; house standard is YOLO11 (n baseline, s escalation)

# TDD §3 augmentation policy. Anything intentionally disabled is documented, not omitted.
augmentation:
  hflip: 0.5        # fliplr — left/right symmetric scenes, safe to flip
  flipud: 0.0        # DISABLED: fixed camera orientation; upside-down heads never occur
  mosaic: 1.0
  mixup: 0.1
  hsv_h: 0.015       # hue jitter
  hsv_s: 0.7         # saturation jitter — wide, for lighting/helmet-color variation
  hsv_v: 0.4         # value/brightness jitter — wide, for lighting variation
  degrees: 10.0      # small rotation jitter, not full-range (cameras are near-fixed-angle)
  perspective: 0.0005

tracking:
  backend: wandb   # wandb | mlflow | none — see PRD OQ3 before enabling wandb media logging
  project: null
