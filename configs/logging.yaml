# Standard logging config, loaded via logging.config.dictConfig() by
# scripts/utilities/logging_setup.py. Call setup_logging() once at every entry point.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    level: DEBUG
    filename: outputs/logs/app.log
    maxBytes: 10000000
    backupCount: 5

root:
  level: INFO
  handlers: [console, file]

loggers:
  urllib3:
    level: WARNING
  PIL:
    level: WARNING
  matplotlib:
    level: WARNING
